<!DOCTYPE html>
<html lang="en">
<!-- this is like 99% vibecoded and is just a temporary thing to test the API -->
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Otter Query Explorer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;padding:24px;max-width:1200px;margin:0 auto}
h1{font-size:1.4rem;margin-bottom:16px;color:#58a6ff}
.filters{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.filter-row{display:flex;gap:8px;align-items:center}
.filter-row select,.filter-row input{background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:6px 10px;border-radius:6px;font-size:14px}
.filter-row select{min-width:150px}
.filter-row input{flex:1;min-width:120px}
.filter-row button{background:transparent;border:1px solid #f85149;color:#f85149;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:14px}
.filter-row button:hover{background:#f8514920}
.controls{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.controls select,.controls input{background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:6px 10px;border-radius:6px;font-size:14px}
.controls input[type=number]{width:80px}
.btn{background:#238636;border:none;color:#fff;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600}
.btn:hover{background:#2ea043}
.btn-secondary{background:#21262d;border:1px solid #30363d;font-weight:normal}
.btn-secondary:hover{background:#30363d}
.status{margin-bottom:12px;font-size:13px;color:#8b949e}
.status .count{color:#58a6ff}
.results-table{width:100%;border-collapse:collapse;font-size:13px;overflow-x:auto;display:block}
.results-table th,.results-table td{text-align:left;padding:8px 12px;border-bottom:1px solid #21262d;white-space:nowrap;max-width:300px;overflow:hidden;text-overflow:ellipsis}
.results-table th{background:#161b22;color:#8b949e;position:sticky;top:0;font-weight:600}
.results-table tr:hover td{background:#161b2280}
a{color:#58a6ff;text-decoration:none}
a:hover{text-decoration:underline}
.tag{display:inline-block;background:#1f6feb30;color:#58a6ff;padding:2px 8px;border-radius:12px;font-size:12px}
label{font-size:13px;color:#8b949e}
.error{color:#f85149;background:#f8514915;padding:12px;border-radius:6px;margin-bottom:12px}
</style>
</head>
<body>
<h1>🦦 Otter Query Explorer</h1>

<div id="filters" class="filters"></div>

<div class="controls">
  <button class="btn-secondary" onclick="addFilter()">+ Add Filter</button>
  <label>Order by
    <select id="order_by">
      <option value="">approved_at (default)</option>
      <option value="hours">hours</option>
      <option value="true_hours">true_hours</option>
      <option value="github_stars">github_stars</option>
      <option value="created_at">created_at</option>
      <option value="updated_at">updated_at</option>
      <option value="country">country</option>
      <option value="ysws">ysws</option>
      <option value="display_name">display_name</option>
    </select>
  </label>
  <label>Direction
    <select id="sort_dir">
      <option value="asc">ASC</option>
      <option selected value="desc">DESC</option>
    </select>
  </label>
  <label>Limit
    <input type="number" id="limit" value="25" min="1" max="100">
  </label>
  <button class="btn" onclick="runQuery(1)">Run Query</button>
</div>

<div id="status" class="status"></div>
<div id="pagination" class="controls" style="display:none">
  <button class="btn-secondary" id="prevBtn" onclick="prevPage()">← Prev</button>
  <span id="pageInfo" style="font-size:13px;color:#8b949e"></span>
  <button class="btn-secondary" id="nextBtn" onclick="nextPage()">Next →</button>
</div>
<div id="error" class="error" style="display:none"></div>
<table class="results-table" id="results"></table>

<script>
const FIELDS = {
  airtable_id:     { type: 'text' },
  ysws:            { type: 'text' },
  country:         { type: 'text' },
  description:     { type: 'text' },
  github_username: { type: 'text' },
  display_name:    { type: 'text' },
  code_url:        { type: 'text' },
  demo_url:        { type: 'text' },
  archived_demo:   { type: 'text' },
  archived_repo:   { type: 'text' },
  hours:           { type: 'int' },
  true_hours:      { type: 'float' },
  github_stars:    { type: 'int' },
  approved_at:     { type: 'timestamp' },
  created_at:      { type: 'timestamp' },
  updated_at:      { type: 'timestamp' },
  has_media:  { type: 'bool' },
};

const OPS_BY_TYPE = {
  text:      ['eq','neq','contains','not_contains','starts_with','ends_with','is_null','is_not_null'],
  int:       ['eq','neq','gt','gte','lt','lte','is_null','is_not_null'],
  float:     ['eq','neq','gt','gte','lt','lte','is_null','is_not_null'],
  timestamp: ['eq','neq','gt','gte','lt','lte','is_null','is_not_null'],
  bool:      ['eq','neq','is_null','is_not_null'],
};

const OP_LABELS = {
  eq:'equals', neq:'not equals', gt:'greater than', gte:'greater or equal',
  lt:'less than', lte:'less or equal', contains:'contains', not_contains:'not contains',
  starts_with:'starts with', ends_with:'ends with', is_null:'is empty', is_not_null:'is not empty',
};

const NO_VALUE_OPS = new Set(['is_null','is_not_null']);

let filterCount = 0;
let yswsPrograms = [];
let currentPage = 1;
let totalPages = 1;

fetch('/api/ysws/list').then(r => r.json()).then(data => {
  yswsPrograms = data.sort();
}).catch(() => {});

function addFilter() {
  const id = filterCount++;
  const div = document.createElement('div');
  div.className = 'filter-row';
  div.id = `filter-${id}`;

  const fieldSel = document.createElement('select');
  fieldSel.id = `field-${id}`;
  for (const f of Object.keys(FIELDS)) {
    const o = document.createElement('option');
    o.value = f; o.textContent = f;
    fieldSel.appendChild(o);
  }

  const opSel = document.createElement('select');
  opSel.id = `op-${id}`;

  const valInput = document.createElement('input');
  valInput.id = `val-${id}`;
  valInput.placeholder = 'value';

  function updateOps() {
    const ft = FIELDS[fieldSel.value].type;
    opSel.innerHTML = '';
    for (const op of OPS_BY_TYPE[ft]) {
      const o = document.createElement('option');
      o.value = op; o.textContent = OP_LABELS[op];
      opSel.appendChild(o);
    }
    updateVal();
  }

  let yswsSel = null;

  function updateVal() {
    const field = fieldSel.value;
    const ft = FIELDS[field].type;
    const op = opSel.value;
    const needsValue = !NO_VALUE_OPS.has(op);
    const useYswsDropdown = needsValue && field === 'ysws' && ['eq','neq'].includes(op) && yswsPrograms.length;

    // toggle ysws select
    if (useYswsDropdown) {
      if (!yswsSel) {
        yswsSel = document.createElement('select');
        yswsSel.id = `yswssel-${id}`;
        div.insertBefore(yswsSel, valInput);
      }
      yswsSel.innerHTML = '';
      for (const p of yswsPrograms) {
        const o = document.createElement('option');
        o.value = p; o.textContent = p;
        yswsSel.appendChild(o);
      }
      yswsSel.style.display = '';
      valInput.style.display = 'none';
      valInput.value = '';
    } else {
      if (yswsSel) yswsSel.style.display = 'none';
      if (needsValue) {
        valInput.style.display = '';
        if (ft === 'int') { valInput.type = 'number'; valInput.placeholder = '0'; }
        else if (ft === 'timestamp') { valInput.type = 'text'; valInput.placeholder = '2025-01-01'; }
        else if (ft === 'bool') { valInput.type = 'text'; valInput.placeholder = 'true / false'; }
        else { valInput.type = 'text'; valInput.placeholder = 'value'; }
      } else {
        valInput.style.display = 'none';
        valInput.value = '';
      }
    }
  }

  fieldSel.addEventListener('change', updateOps);
  opSel.addEventListener('change', updateVal);

  const removeBtn = document.createElement('button');
  removeBtn.textContent = '✕';
  removeBtn.onclick = () => {
    div.remove();
    runQuery(1);
  };

  div.append(fieldSel, opSel, valInput, removeBtn);
  document.getElementById('filters').appendChild(div);
  updateOps();
}

function buildFilters() {
  const rows = document.querySelectorAll('.filter-row');
  const filters = [];
  for (const row of rows) {
    const id = row.id.split('-')[1];
    const field = document.getElementById(`field-${id}`).value;
    const op = document.getElementById(`op-${id}`).value;
    const valEl = document.getElementById(`val-${id}`);
    const ft = FIELDS[field].type;

    const filter = { field, op };
    if (!NO_VALUE_OPS.has(op)) {
      const yswsSelEl = document.getElementById(`yswssel-${id}`);
      const useYsws = yswsSelEl && yswsSelEl.style.display !== 'none';
      let v = useYsws ? yswsSelEl.value : valEl.value;
      if (ft === 'int') v = parseInt(v, 10) || 0;
      else if (ft === 'bool') v = v === 'true' || v === '1';
      filter.value = v;
    }
    filters.push(filter);
  }
  return filters;
}

function prevPage() { if (currentPage > 1) runQuery(currentPage - 1); }
function nextPage() { if (currentPage < totalPages) runQuery(currentPage + 1); }

function addYswsFilter(value) {
  addFilter();
  const id = filterCount - 1;
  document.getElementById(`field-${id}`).value = 'ysws';
  document.getElementById(`field-${id}`).dispatchEvent(new Event('change'));
  document.getElementById(`op-${id}`).value = 'eq';
  document.getElementById(`op-${id}`).dispatchEvent(new Event('change'));
  const yswsSel = document.getElementById(`yswssel-${id}`);
  if (yswsSel && yswsSel.style.display !== 'none') {
    yswsSel.value = value;
  } else {
    document.getElementById(`val-${id}`).value = value;
  }
  runQuery(1);
}

async function runQuery(page) {
  currentPage = page || 1;
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';

  const body = { filters: buildFilters(), limit: parseInt(document.getElementById('limit').value,10) || 25, page: currentPage };
  const ob = document.getElementById('order_by').value;
  if (ob) body.order_by = ob;
  body.sort_direction = document.getElementById('sort_dir').value;

  const t0 = performance.now();
  let res;
  try {
    res = await fetch('/api/query', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
  } catch(e) {
    errEl.textContent = 'Network error: ' + e.message;
    errEl.style.display = '';
    return;
  }

  if (!res.ok) {
    errEl.textContent = `Error ${res.status}: ${await res.text()}`;
    errEl.style.display = '';
    return;
  }

  const json = await res.json();
  const data = json.data;
  const total = json.total;
  totalPages = Math.max(1, Math.ceil(total / json.per_page));
  const ms = (performance.now() - t0).toFixed(0);
  document.getElementById('status').innerHTML = `<span class="count">${total}</span> total results, showing ${data.length} in ${ms}ms`;

  const pagDiv = document.getElementById('pagination');
  if (total > json.per_page) {
    pagDiv.style.display = '';
    document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
    document.getElementById('prevBtn').disabled = currentPage <= 1;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages;
  } else {
    pagDiv.style.display = 'none';
  }

  const table = document.getElementById('results');
  if (!data.length) { table.innerHTML = '<tr><td>No results found.</td></tr>'; return; }

  const cols = Object.keys(data[0]);
  let html = '<thead><tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
  for (const row of data) {
    html += '<tr>';
    for (const c of cols) {
      let v = row[c];
      if (v === null || v === undefined) v = '<span style="color:#484f58">null</span>';
      else if (c === 'has_media') v = row.has_media ? `<a href="/api/image/${row.id}/r" target="_blank">✅</a>` : '❌';
      else if (c === 'approved_at' && typeof v === 'number') v = new Date(v * 1000).toLocaleDateString();
      else if (c === 'description' && v.length > 100) v = escapeHtml(v.slice(0,100)) + '...';
      else if (c === 'github_username' && v) v = renderExternalLink(`https://github.com/${v}`, v);
      else if (['code_url', 'demo_url', 'archived_repo', 'archived_demo'].includes(c) && v) {
        const labels = {
          code_url: 'code',
          demo_url: 'demo',
          archived_repo: 'code archive',
          archived_demo: 'demo archive',
        };
        v = renderExternalLink(v, labels[c]);
      }
      else if (c === 'ysws') v = `<span class="tag" style="cursor:pointer" onclick="addYswsFilter('${escapeHtml(String(v))}')">${escapeHtml(String(v))}</span>`;
      else if (typeof v === 'boolean') v = v ? '✅' : '❌';
      else if (typeof v === 'number') v = Math.round(v) == v ? v : v.toFixed(2);
      html += `<td>${v}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody>';
  table.innerHTML = html;
}

function escapeHtml(text) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, m => map[m]);
}

function renderExternalLink(url, label) {
  const href = safeExternalUrl(url);
  if (!href) return escapeHtml(String(url));
  return `<a href="${href}" target="_blank" rel="noopener noreferrer">${escapeHtml(String(label))}</a>`;
}

function safeExternalUrl(url) {
  try {
    const parsed = new URL(String(url), window.location.origin);
    if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') return '';
    return escapeHtml(parsed.href);
  } catch {
    return '';
  }
}

addFilter();
</script>
</body>
</html>
