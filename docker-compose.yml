services:
  app:
    build: .
    container_name: otter-app
    restart: unless-stopped
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/otter
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0:3000
    volumes:
      - fastembed_cache:/app/.fastembed_cache

  db:
    image: ankane/pgvector:latest
    container_name: pgvector-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: otter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: >
      redis-server
      --appendonly yes
      --save 60 1000

volumes:
  pgdata:
  redisdata:
  fastembed_cache:
